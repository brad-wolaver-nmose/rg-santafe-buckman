# Ruff linter and formatter configuration
# https://docs.astral.sh/ruff/

line-length = 99

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
    "UP",  # pyupgrade
]
ignore = [
    "E501",  # line too long (handled by formatter)
]

[lint.per-file-ignores]
# test_modflow_geometry needs sys.path manipulation before importing stream_depletions
"tests/test_modflow_geometry.py" = ["I001", "E402"]
