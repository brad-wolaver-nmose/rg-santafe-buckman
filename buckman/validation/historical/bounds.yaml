# =============================================================================
# VALIDATION THRESHOLDS
# =============================================================================
thresholds:
  description: "Thresholds for ballpark_check.py"

  # Sigma multipliers for flagging
  soft_flag_sigma: 2.0   # Flag if > 2 sigma from historical mean
  hard_fail_sigma: 3.0   # Fail if > 3 sigma from historical mean

  # Absolute bounds (physics-based)
  min_pumping_af: 0.0    # Cannot pump negative water
  max_pumping_af: 5000.0 # Engineering limit (unrealistic above this)

  # Monotonicity tolerance (for cumulative depletions)
  monotonic_tolerance_af: 0.01  # Allow tiny floating-point errors
